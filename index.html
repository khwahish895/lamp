<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lamp Glowing Effect</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}

/* Lamp Container */
.lamp {
    position: relative;
    width: 200px;
    height: 400px;
}

/* Wire */
.wire {
    width: 4px;
    height: 150px;
    background: #444;
    margin: auto;
}

/* Bulb */
.bulb {
    position: relative;
    width: 100px;
    height: 120px;
    background: radial-gradient(circle at top, #fff, #ddd);
    border-radius: 50%;
    margin: auto;
}

/* Bulb Base */
.bulb::after {
    content: "";
    position: absolute;
    bottom: -20px;
    left: 25px;
    width: 50px;
    height: 20px;
    background: #555;
    border-radius: 0 0 10px 10px;
}

/* Glow */
.glow {
    position: absolute;
    top: 140px;
    left: 50%;
    transform: translateX(-50%);
    width: 250px;
    height: 250px;
    background: radial-gradient(circle, rgba(255,255,180,0.8), transparent 70%);
    filter: blur(20px);
    animation: flicker 2s infinite alternate;
}

/* Flicker Animation */
@keyframes flicker {
    from {
        opacity: 0.6;
    }
    to {
        opacity: 1;
    }
}

</style>
</head>

<body>

<div class="lamp">
    <div class="wire"></div>
    <div class="bulb"></div>
    <div class="glow"></div>
</div>

</body>
</html>
